<div class="pessoa">
  <div class="nova-pessoa">
    <button class="nova-pessoa-btn" mat-flat-button color="primary" (click)="abrirModal()">
      <div class="label">NOVA PESSOA</div>
      <div class="icon">
        <mat-icon>add</mat-icon>
      </div>
    </button>
  </div>

  <div class="tabela-pessoa">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let pessoa"> {{ pessoa.id }} </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> ID Pessoa </th>
        <td mat-cell *matCellDef="let pessoa"> {{ pessoa.nome }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
