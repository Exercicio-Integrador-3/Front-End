<div class="contrato">
  <div class="novo-contrato">
    <button class="novo-contrato-btn" mat-flat-button color="primary" (click)="abrirModal()">
      <div class="label">NOVO CONTRATO</div>
      <div class="icon">
        <mat-icon>add</mat-icon>
      </div>
    </button>
  </div>

  <div class="tabela-contrato">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.id }} </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.nome }} </td>
      </ng-container>

      <ng-container matColumnDef="funcao">
        <th mat-header-cell *matHeaderCellDef> Função </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.funcao }} </td>
      </ng-container>

      <ng-container matColumnDef="dataInicio">
        <th mat-header-cell *matHeaderCellDef> Início </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.dataInicio | date:'dd/MM/yyyy' }} </td>
      </ng-container>

      <ng-container matColumnDef="dataFim">
        <th mat-header-cell *matHeaderCellDef> Fim </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.dataFim | date:'dd/MM/yyyy' }} </td>
      </ng-container>

      <ng-container matColumnDef="horasSemanais">
        <th mat-header-cell *matHeaderCellDef> Horas/Semana </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.horasSemanais }}h </td>
      </ng-container>

      <ng-container matColumnDef="salarioHora">
        <th mat-header-cell *matHeaderCellDef> R$/Hora </th>
        <td mat-cell *matCellDef="let contrato"> {{ contrato.salarioHora | currency:'BRL' }} </td>
      </ng-container>

      
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
