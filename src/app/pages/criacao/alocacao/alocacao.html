<div class="alocacao">
  <div class="nova-alocacao">
    <button class="nova-alocacao-btn" mat-flat-button color="primary" (click)="abrirModal()">
      <div class="label">NOVA ALOCAÇÃO</div>
      <div class="icon">
        <mat-icon>add</mat-icon>
      </div>
    </button>
  </div>

  <div class="tabela-alocacao">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.nome }} </td>
      </ng-container>

      <ng-container matColumnDef="funcao">
        <th mat-header-cell *matHeaderCellDef> Função </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.funcao }} </td>
      </ng-container>


      <ng-container matColumnDef="nomeProjeto">
        <th mat-header-cell *matHeaderCellDef> Projeto </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.nomeProjeto }} </td>
      </ng-container>

      <ng-container matColumnDef="quantidadeHoras">
        <th mat-header-cell *matHeaderCellDef> Quantidade Horas </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.quantidadeHoras }} </td>
      </ng-container>
      
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
