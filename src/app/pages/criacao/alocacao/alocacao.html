<div class="alocacao">
  <div class="nova-alocacao">
    <button class="nova-alocacao-btn" mat-flat-button color="primary" (click)="abrirModal()">
      <div class="label">NOVA ALOCAÇÃO</div>
      <div class="icon">
        <mat-icon>add</mat-icon>
      </div>
    </button>
  </div>

  <div class="tabela-alocacao">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="idPerfilPessoa">
        <th mat-header-cell *matHeaderCellDef> ID Perfil Pessoa </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.idPerfilPessoa }} </td>
      </ng-container>

      <ng-container matColumnDef="idProjeto">
        <th mat-header-cell *matHeaderCellDef> ID Projeto </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.idProjeto }} </td>
      </ng-container>


      <ng-container matColumnDef="quantidadeHoras">
        <th mat-header-cell *matHeaderCellDef> quantidadeHoras </th>
        <td mat-cell *matCellDef="let alocacao"> {{ alocacao.quantidadeHoras }} </td>
      </ng-container>
      
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
