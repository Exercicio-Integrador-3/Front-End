<mat-dialog-content id="container">
    <div class="content">
        <div class="top">
            <h1>CUSTOS</h1>
        </div>
        <form [formGroup]="range">
            <div class="bottom">
                <div class="custoTotal">
                    <p>Custo total do projeto: {{ custoTotal }}</p>
                </div>
                <div class="custosData">
                    <mat-form-field>
                        <mat-date-range-input [rangePicker]="picker">
                            <input matStartDate formControlName="start" placeholder="Data de inicio">
                            <input matEndDate formControlName="end" placeholder="Data final">
                        </mat-date-range-input>
                        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                        <mat-date-range-picker #picker></mat-date-range-picker>
                    </mat-form-field>
                </div>
            </div>
        </form>
        <button matButton="elevated" id="calcular-btn">Calcular</button>
        
    </div>
</mat-dialog-content>
