name: Angular CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]   # você pode adicionar outras versões se quiser

    steps:
      # 1. Pegar o código
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 3. Instalar dependências
      - name: Install dependencies
        run: npm ci

      # 6. Build da aplicação
      - name: Build
        run: npm run build --prod
